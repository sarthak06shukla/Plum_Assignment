services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plum
      POSTGRES_USER: plum
      POSTGRES_PASSWORD: plum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://plum:plum@postgres:5432/plum
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: local-docker-secret
      OPENAI_MODEL: gpt-4o
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
