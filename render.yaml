services:
  - type: web
    name: plum-assignment-backend
    runtime: docker
    plan: free
    dockerfilePath: ./docker/backend.Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: plum-assignment-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://localhost:3001,https://plum-assignment-sand.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: ""
      - key: EASYOCR_DOWNLOAD_ENABLED
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-4o

databases:
  - name: plum-assignment-db
    plan: free
    databaseName: plum
    user: plum
